<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ULTRA SCAN SYSTEM</title>

<style>
body {
    margin:0;
    font-family: monospace;
    background:black;
    color:#00ff00;
    overflow:hidden;
}

/* ОСНОВА */
#app { padding:20px; z-index:1; position:relative; }

h1 {
    text-align:center;
    text-shadow:0 0 20px #00ff00;
}

button {
    padding:15px 25px;
    font-size:18px;
    background:#00ff00;
    border:none;
    cursor:pointer;
}

#progressBar {
    width:100%;
    height:30px;
    background:#111;
    margin-top:20px;
}

#progress {
    height:100%;
    width:0%;
    background:#00ff00;
}

#log {
    margin-top:20px;
    height:250px;
    overflow:auto;
    background:#000;
    padding:10px;
}

.red { color:red; }

/* ЭКРАН */
#alertScreen {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
}

/* затемнение */
#overlay {
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    z-index:1;
}

/* текст сверху */
#content {
    position:relative;
    z-index:2;
    text-align:center;
}

#alertTitle {
    color:red;
    font-size:60px;
    text-shadow:0 0 40px red;
}

#typing {
    margin-top:30px;
    width:80%;
    font-size:20px;
}

/* мигание (теперь не ломает текст) */
.blink {
    animation: blink 0.2s infinite;
}

@keyframes blink {
    0% { background-color: rgba(0,0,0,0.9); }
    50% { background-color: rgba(100,0,0,0.9); }
    100% { background-color: rgba(0,0,0,0.9); }
}

/* цифры */
.rand {
    position:absolute;
    color:#00ff00;
    font-size:14px;
    opacity:0.6;
    z-index:0; /* ВАЖНО — под текстом */
    pointer-events:none;
}
</style>
</head>

<body>

<div id="app">

<h1>ULTRA VIRUS SCANNER</h1>

<div style="text-align:center;">
    <button onclick="startScan()">СКАНИРОВАТЬ</button>
</div>

<div id="progressBar">
    <div id="progress"></div>
</div>

<div id="log"></div>

</div>

<div id="alertScreen">
    <div id="overlay"></div>

    <div id="content">
        <div id="alertTitle">УГРОЗА БЕЗОПАСНОСТИ</div>
        <div id="typing"></div>
    </div>
</div>

<script>

let progress = 0;

function log(text, color="") {
    let el = document.createElement("div");
    el.className = color;
    el.textContent = "> " + text;
    document.getElementById("log").appendChild(el);
}

function startScan() {
    document.documentElement.requestFullscreen?.();

    document.getElementById("log").innerHTML = "";

    progress = 0;

    let interval = setInterval(() => {

        progress += Math.random() * 5;
        if (progress > 100) progress = 100;

        document.getElementById("progress").style.width = progress + "%";

        if (Math.random() > 0.6) {
            log("ОБНАРУЖЕНА УГРОЗА!", "red");
        } else {
            log("Сканирование...");
        }

        if (progress >= 100) {
            clearInterval(interval);
            setTimeout(showAlert, 1000);
        }

    }, 150);
}

function showAlert() {
    document.getElementById("alertScreen").style.display = "flex";
    startTyping();
}

/* печатание */
let text = `
настоящее имя: Виктор...
сбор данных...
доступ получен...
пробив по базам...
невозможно остановить...
`;

let i = 0;

function startTyping() {
    let el = document.getElementById("typing");

    let interval = setInterval(() => {
        if (i < text.length) {
            el.textContent += text[i];
            i++;
        } else {
            clearInterval(interval);
            startChaos();
        }
    }, 30);
}

/* ХАОС */
function startChaos() {

    document.getElementById("overlay").classList.add("blink");

    // ERROR текст
    setInterval(() => {
        document.getElementById("alertTitle").textContent =
            Math.random() > 0.5 ? "ERROR ERROR ERROR" : "!!! SYSTEM FAILURE !!!";
    }, 120);

    // цифры
    for (let j = 0; j < 100; j++) spawnNumbers();
}

function spawnNumbers() {
    let div = document.createElement("div");
    div.className = "rand";

    div.style.left = Math.random() * window.innerWidth + "px";
    div.style.top = Math.random() * window.innerHeight + "px";

    document.body.appendChild(div);

    setInterval(() => {
        div.textContent += Math.floor(Math.random() * 10);
    }, 30);
}

</script>

</body>
</html>
